networks:
  cib-net:
    driver: bridge

volumes:
  jenkins_home:

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    networks:
      - cib-net
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: unless-stopped
